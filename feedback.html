<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HerStyle | Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-kicker">Women's Fashion Store</span>
      <span class="brand-name">HerStyle</span>
    </a>

    <nav class="main-nav">
      <a class="nav-link" href="index.html">Shop</a>
      <a class="nav-link" href="cart.html">Cart <span class="cart-count" data-cart-count>0</span></a>
      <a class="nav-link" href="checkout.html">Checkout</a>
      <a class="nav-link active" href="feedback.html">Feedback</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="section-title">Customer Feedback</h1>
    <p class="muted">Please submit your response using the form below.</p>

    <section class="form-card">
      <h2>Submit Feedback</h2>
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSd1bG8ed-m3RKt_62Undy7gfnF_51lQLGe6-7x1fJS-Mo0xkg/viewform?embedded=true"
        width="100%"
        height="1591"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        loading="lazy">
        Loading...
      </iframe>
    </section>
  </main>

  <script src="store-data.js"></script>
  <script src="store-cart.js"></script>
  <script>
    if (window.StoreCart && typeof window.StoreCart.refreshBadges === "function") {
      window.StoreCart.refreshBadges();
    }
  </script>
</body>
</html>
